databases:
  - name: san-roque-db
    databaseName: san_roque_gps
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  - type: web
    name: san-roque-api
    region: oregon
    plan: free
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/app.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: san-roque-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: PORT
        value: "10000"
    healthCheckPath: /health

  - type: static
    name: san-roque-frontend
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "" # Set this to your backend URL after deploy (e.g. https://san-roque-api.onrender.com/api)
      - key: VITE_SOCKET_URL
        value: "" # Set this to your backend URL after deploy (e.g. https://san-roque-api.onrender.com)
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
